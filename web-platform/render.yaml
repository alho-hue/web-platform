services:
  - type: web
    name: pipchi-web-platform
    runtime: node
    plan: free
    buildCommand: cd web-platform && npm install --legacy-peer-deps && chmod +x build.sh && ./build.sh
    startCommand: node web-platform/server.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 3000
      - key: ADMIN_KEY
        value: PipChi-admin
      - key: INACTIVITY_DAYS
        value: 7
